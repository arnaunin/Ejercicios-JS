<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            z-index: 10;
            background-color: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .lista {
            list-style: none;
            padding: 0;
            margin: 0;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .lista > li {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <a href="../index.html">Inicio</a>

    <div class="container">
        <input type="text" id="input">
    </div>

    <ul class="lista"></ul>

    <script type="module" src="script.js"></script>
</body>
</html>
